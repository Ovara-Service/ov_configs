<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Config Editor</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="config-editor" class="hidden">
            <button id="close-button" class="close-button">X</button>
            <h1 id="config-title">Config Editor</h1>
            <div id="config-list-container" class="hidden">
                <h2>Available Configs</h2>
                <ul id="config-list"></ul>
            </div>
            <div id="config-container" class="hidden"></div>
            <button id="save-button" class="hidden">Save</button>
        </div>
        <div id="copy-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Copy Object</h3>
                <p>Enter a name for the new object:</p>
                <input type="text" id="copy-new-key" placeholder="New Name">
                <div id="copy-error-message" class="error-message hidden"></div>
                <div class="modal-buttons">
                    <button id="modal-cancel-button" class="cancel-button">Cancel</button>
                    <button id="modal-confirm-button" class="confirm-button">Copy</button>
                </div>
            </div>
        </div>
        <script src="scripts.js"></script>
    </body>
</html>
